<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GXM Insight Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f8f9fa;
    --border: #e1e4e8;
    --border-strong: #c8cdd5;
    --accent: #1a9e6e;
    --accent-dim: rgba(26,158,110,0.08);
    --accent-hover: #158a5e;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --danger: #dc2626;
    --danger-dim: rgba(220,38,38,0.08);
    --warning: #d97706;
    --warning-dim: rgba(217,119,6,0.08);
    --success: #1a9e6e;
    --success-dim: rgba(26,158,110,0.08);
    --radius: 8px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header — matches HSP Group top bar style */
  .header {
    width: 100%;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .header-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .header-sep { color: var(--border-strong); margin: 0 2px; font-size: 16px; }
  .header-sub { font-size: 13px; color: var(--text-muted); }
  .header-right { margin-left: auto; font-size: 12px; color: var(--text-dim); }

  /* Main layout */
  .main {
    width: 100%;
    max-width: 720px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 24px;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
  }
  .progress-step {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.3s ease;
  }
  .progress-step.done { background: var(--accent); }
  .progress-step.active { background: var(--accent); opacity: 0.4; }

  /* Chat messages */
  .messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
    min-height: 300px;
  }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-items: flex-start; }
  .msg.user { align-items: flex-start; flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
  }
  .avatar.bot-av {
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    color: var(--accent);
  }
  .avatar.user-av {
    background: #e5e7eb;
    color: var(--text-muted);
  }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.55;
  }
  .msg.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 3px;
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .msg.user .bubble {
    background: var(--accent-dim);
    border: 1px solid rgba(26,158,110,0.2);
    border-top-right-radius: 3px;
    color: var(--text);
  }

  /* Option chips — pill style matching GXM status tags */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }
  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* Input area — matches GXM message composer */
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: flex-end;
    padding: 9px 12px;
    gap: 8px;
    transition: border-color 0.15s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,158,110,0.1);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }
  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; fill: #fff; }

  /* Result card — matches GXM detail panel style */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.35s ease forwards;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .result-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .result-header span {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .badge {
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .badge.critical { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(220,38,38,0.2); }
  .badge.critical::before { background: var(--danger); }
  .badge.significant { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(217,119,6,0.2); }
  .badge.significant::before { background: var(--warning); }
  .badge.minor { background: var(--success-dim); color: var(--success); border: 1px solid rgba(26,158,110,0.2); }
  .badge.minor::before { background: var(--success); }

  .result-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .result-row { display: flex; flex-direction: column; gap: 3px; }
  .result-label {
    font-size: 10.5px; font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.07em;
  }
  .result-value { font-size: 13.5px; color: var(--text); line-height: 1.5; }
  .result-quote {
    font-size: 13.5px; color: var(--text-muted);
    line-height: 1.6;
    padding-left: 12px;
    border-left: 2px solid var(--accent);
    font-style: italic;
  }

  .result-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--surface2);
  }
  .btn {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-secondary { background: var(--surface); color: var(--text-muted); border-color: var(--border-strong); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-success { background: var(--success-dim); color: var(--success); border-color: rgba(26,158,110,0.25); }

  .typing { display: flex; align-items: center; gap: 4px; padding: 3px 0; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  .email-note {
    font-size: 12px; color: var(--text-muted);
    margin-top: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .email-note input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    width: 260px;
    outline: none;
    transition: border-color 0.15s;
  }
  .email-note input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,158,110,0.1);
  }
  .voice-btn {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .voice-btn:hover { border-color: var(--accent); background: var(--accent-dim); }
  .voice-btn.listening { background: var(--danger-dim); border-color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
    50% { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
  }
  .voice-btn svg { width: 15px; height: 15px; }
  .chip-group { margin-left: 40px; margin-top: 8px; }
  .chip-group-label {
    font-size: 10.5px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.07em;
    margin-bottom: 5px; margin-top: 10px;
  }
  .chip-group-label:first-child { margin-top: 0; }
  .bubble .msg-step {
    font-size: 10px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .bubble .msg-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .bubble .msg-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">GX</div>
  <div class="header-title">GXM</div>
  <span class="header-sep">›</span>
  <div class="header-sub">Insight Capture</div>
  <div class="header-right">Powered by Claude</div>
</div>

<div class="main">
  <div class="progress-wrap" id="progressBar"></div>
  <div class="messages" id="messages"></div>
  <div id="inputArea">
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Type or use the mic..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Speak your answer">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="email-note">
      Productboard email: <input type="email" id="pbEmail" placeholder="yourteam@inbox.productboard.com">
    </div>
  </div>
</div>

<script>
const STEPS = 7;
let step = 0;
let insight = { sourceType:'', contact:'', date:'', trying:'', pain:'', quote:'', severity:'', relatedFeature:'' };
let awaitingChip = false;
let recognition = null;
let isListening = false;

// Structured questions with headers, hints, and grouped chips where applicable
const questions = [
  {
    key: 'sourceType',
    stepLabel: 'Step 1 of 7',
    title: 'Source type',
    hint: 'Who did this conversation happen with?',
    chipGroups: [{ label: 'Select one', chips: ['LSP', 'Customer', 'Sales', 'Ops', 'Internal'] }]
  },
  {
    key: 'contact',
    stepLabel: 'Step 2 of 7',
    title: 'Contact',
    hint: 'First name and company — e.g. <em>Maria, Grupo Fiscal BR</em>. Just "ops team" if internal.',
    chipGroups: null
  },
  {
    key: 'trying',
    stepLabel: 'Step 3 of 7',
    title: 'What were they trying to do?',
    hint: 'Describe their <strong>goal</strong>, not their complaint. One sentence.',
    chipGroups: [
      { label: 'Common goals — tap or type your own', chips: [
        'Generate a compliance report', 'Manage entity data for a client',
        'Set up a new entity', 'Bulk update entity information',
        'Find a specific entity', 'Share data with their team'
      ]}
    ]
  },
  {
    key: 'pain',
    stepLabel: 'Step 4 of 7',
    title: 'What was the friction or pain?',
    hint: 'Be specific — e.g. <em>"couldn\'t find the entity hierarchy"</em> beats <em>"navigation was confusing"</em>.',
    chipGroups: [
      { label: 'Common pain patterns — tap or describe your own', chips: [
        'Couldn\'t find the feature', 'Process took too many steps',
        'Had to export to Excel instead', 'No bulk action available',
        'Missing data or field', 'Confusing navigation',
        'Slow performance', 'Permissions blocked access'
      ]}
    ]
  },
  {
    key: 'quote',
    stepLabel: 'Step 5 of 7',
    title: 'Direct quote',
    hint: 'The most memorable thing they said — even a rough paraphrase. Tap <strong>Skip</strong> if nothing stands out.',
    chipGroups: [{ label: '', chips: ['Skip'] }]
  },
  {
    key: 'severity',
    stepLabel: 'Step 6 of 7',
    title: 'Severity',
    hint: 'How much did this affect them?',
    chipGroups: [{ label: 'Select one', chips: [
      'Critical — blocked or losing trust',
      'Significant — major friction',
      'Minor — nice to have'
    ]}]
  },
  {
    key: 'relatedFeature',
    stepLabel: 'Step 7 of 7',
    title: 'Related feature or area',
    hint: 'Does this link to an existing Productboard feature? Tap a common area or type your own.',
    chipGroups: [
      { label: 'GXM areas', chips: [
        'Entity management', 'Reporting', 'Onboarding',
        'Permissions', 'Search', 'Integrations',
        'Data quality', 'Notifications', 'Skip — identify later'
      ]}
    ]
  }
];

function buildBotHtml(q) {
  return `
    <div class="msg-step">${q.stepLabel}</div>
    <div class="msg-title">${q.title}</div>
    ${q.hint ? `<div class="msg-hint">${q.hint}</div>` : ''}
  `;
}

function addMsg(who, html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${who}`;
      div.innerHTML = `<div class="avatar ${who}-av">${who === 'bot' ? 'AI' : 'YOU'}</div><div class="bubble">${html}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping() {
  return new Promise(resolve => {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'typing-indicator';
    div.innerHTML = `<div class="avatar bot-av">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { const el = document.getElementById('typing-indicator'); if (el) el.remove(); resolve(); }, 800);
  });
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < STEPS; i++) {
    const s = document.createElement('div');
    s.className = 'progress-step' + (i < step ? ' done' : i === step ? ' active' : '');
    bar.appendChild(s);
  }
}

function showChipGroups(groups, key) {
  awaitingChip = true;
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.id = 'chips-container';
  wrap.className = 'chip-group';
  groups.forEach(g => {
    if (g.label) {
      const lbl = document.createElement('div');
      lbl.className = 'chip-group-label';
      lbl.textContent = g.label;
      wrap.appendChild(lbl);
    }
    const row = document.createElement('div');
    row.className = 'chips';
    g.chips.forEach(c => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = c;
      chip.onclick = () => selectChip(c, key);
      row.appendChild(chip);
    });
    wrap.appendChild(row);
  });
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  // Still allow typing for free-text override
  document.getElementById('userInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
}

function removeChips() {
  const c = document.getElementById('chips-container');
  if (c) c.remove();
  awaitingChip = false;
}

async function selectChip(value, key) {
  removeChips();
  let stored = value;
  if (key === 'severity') {
    stored = value.startsWith('Critical') ? 'Critical' : value.startsWith('Significant') ? 'Significant' : 'Minor';
  } else if (value === 'Skip' || value === 'Skip — identify later') {
    stored = '';
  }
  insight[key] = stored;
  await addMsg('user', stored || 'Skip');
  step++;
  updateProgress();
  await nextStep();
}

async function nextStep() {
  if (step >= questions.length) { await finalizeInsight(); return; }
  const q = questions[step];
  await showTyping();
  await addMsg('bot', buildBotHtml(q));
  if (q.chipGroups) showChipGroups(q.chipGroups, q.key);
  else document.getElementById('userInput').focus();
}

async function handleSend() {
  const input = document.getElementById('userInput');
  const val = input.value.trim();
  if (!val) return;
  removeChips();
  input.value = '';
  autoResize(input);
  await addMsg('user', val);
  const q = questions[step];
  if (q) {
    const isSkip = val.toLowerCase() === 'skip';
    insight[q.key] = isSkip ? '' : val;
  }
  step++;
  updateProgress();
  await nextStep();
}

// Voice input
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input is not supported in this browser. Try Chrome.');
    return;
  }
  if (isListening) {
    recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('voiceBtn').classList.add('listening');
    document.getElementById('userInput').placeholder = 'Listening...';
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('userInput').value = transcript;
    autoResize(document.getElementById('userInput'));
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('userInput').placeholder = 'Type or use the mic...';
  };
  recognition.onerror = () => {
    isListening = false;
    document.getElementById('voiceBtn').classList.remove('listening');
    document.getElementById('userInput').placeholder = 'Type or use the mic...';
  };
  recognition.start();
}

async function finalizeInsight() {
  document.getElementById('inputArea').style.display = 'none';
  await showTyping();
  await addMsg('bot', '<div class="msg-title">All done!</div><div class="msg-hint">Formatting your Productboard note now...</div>');
  await showTyping();

  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  insight.date = today;
  const badgeClass = insight.severity === 'Critical' ? 'critical' : insight.severity === 'Significant' ? 'significant' : 'minor';

  const noteText =
`SOURCE TYPE: ${insight.sourceType}
CONTACT: ${insight.contact}
DATE: ${insight.date}

WHAT THEY WERE TRYING TO DO:
${insight.trying}

THE FRICTION OR PAIN:
${insight.pain}
${insight.quote ? `\nDIRECT QUOTE:\n"${insight.quote}"\n` : ''}
SEVERITY: ${insight.severity}

RELATED FEATURE OR AREA: ${insight.relatedFeature || 'To be identified during synthesis'}`;

  const msgs = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-header">
      <span>Productboard note</span>
      <span class="badge ${badgeClass}">${insight.severity}</span>
    </div>
    <div class="result-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="result-row"><div class="result-label">Source type</div><div class="result-value">${insight.sourceType}</div></div>
        <div class="result-row"><div class="result-label">Contact</div><div class="result-value">${insight.contact}</div></div>
        <div class="result-row"><div class="result-label">Date</div><div class="result-value">${insight.date}</div></div>
      </div>
      <div class="result-row"><div class="result-label">What they were trying to do</div><div class="result-value">${insight.trying}</div></div>
      <div class="result-row"><div class="result-label">The friction or pain</div><div class="result-value">${insight.pain}</div></div>
      ${insight.quote ? `<div class="result-row"><div class="result-label">Direct quote</div><div class="result-quote">${insight.quote}</div></div>` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="result-row"><div class="result-label">Severity</div><div class="result-value">${insight.severity}</div></div>
        <div class="result-row">
          <div class="result-label">Related feature or area</div>
          <div class="result-value" style="color:${insight.relatedFeature ? 'var(--text)' : 'var(--text-dim)'}">
            ${insight.relatedFeature || 'To be identified during synthesis'}
          </div>
        </div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="sendPbBtn" onclick="sendToProductboard(${JSON.stringify(noteText)})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Send to Productboard
      </button>
      <button class="btn btn-secondary" onclick="copyNote(${JSON.stringify(noteText)})">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy note
      </button>
      <button class="btn btn-secondary" onclick="startOver()">New insight</button>
    </div>
  `;
  msgs.appendChild(card);
  msgs.scrollTop = msgs.scrollHeight;
  updateProgress();
}

function copyNote(text) {
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target.closest('.btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!';
    btn.className = 'btn btn-success';
    setTimeout(() => { btn.innerHTML = orig; btn.className = 'btn btn-secondary'; }, 2000);
  });
}

function sendToProductboard(noteText) {
  const email = document.getElementById('pbEmail').value.trim();
  if (!email) { alert('Please enter your Productboard inbox email address first.'); return; }
  const subject = encodeURIComponent(`GXM Insight — ${insight.sourceType} — ${insight.relatedFeature || 'Unlinked'} [${insight.severity}]`);
  window.location.href = `mailto:${email}?subject=${subject}&body=${encodeURIComponent(noteText)}`;
  const btn = document.getElementById('sendPbBtn');
  btn.innerHTML = '✓ Opening email client...';
  btn.className = 'btn btn-success';
}

function startOver() {
  step = 0;
  insight = { sourceType:'', contact:'', date:'', trying:'', pain:'', quote:'', severity:'', relatedFeature:'' };
  document.getElementById('messages').innerHTML = '';
  document.getElementById('inputArea').style.display = '';
  updateProgress();
  init();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function init() {
  updateProgress();
  const q = questions[0];
  await addMsg('bot', `
    <div class="msg-hint" style="margin-bottom:8px">👋 Hi! I'll help you log this insight in under 2 minutes. Most answers are just one tap.</div>
    <div class="msg-step">${q.stepLabel}</div>
    <div class="msg-title">${q.title}</div>
    <div class="msg-hint">${q.hint}</div>
  `, 300);
  showChipGroups(q.chipGroups, q.key);
}

init();
</script>
</body>
</html>
